<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Alumno</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 30px;
    }

    h1 {
        color: #2c3e50;
    }

    form {
        max-width: 500px;
    }

    label {
        font-weight: bold;
        display: block;
        margin-top: 12px;
    }

    input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        box-sizing: border-box;
    }

    button {
        margin-top: 20px;
        padding: 10px 15px;
        border: none;
        background-color: #3498db;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background-color: #2980b9;
    }

    a {
        text-decoration: none;
        color: #3498db;
        font-weight: bold;
    }
</style>
</head>
<body>

<h1>Alumno</h1>

<form th:action="${alumno.id} == null ? @{/alumnos/save} : @{/alumnos/update/{id}(id=${alumno.id})}"
      th:object="${alumno}" method="post">

    <input type="hidden" th:field="*{id}" />

    <label>Nombre:</label>
    <input type="text" th:field="*{nombre}" />

    <label>Apellidos:</label>
    <input type="text" th:field="*{apellidos}" />

    <label>Email:</label>
    <input type="text" th:field="*{email}" />

    <label>Telefono:</label>
    <input type="text" th:field="*{telefono}" />

    <button type="submit">Guardar</button>
</form>

<br>
<a href="/alumnos/list">Volver</a>

</body>
</html>
